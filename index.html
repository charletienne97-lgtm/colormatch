<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colour Match — Cartoon Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Colour Match — Cartoon Game</h1>
    
    <div id="target-prompt">Find the: <span id="region-name">Loading...</span></div>

    <div id="game">
      <div id="character-panel">
        <img id="char-image" src="" alt="">
        <div id="char-caption" class="char-caption">Loading character…</div>
      </div>
      <div id="controls">
        <div id="instructions">Adjust the Hue, Saturation, and Contrast to match the hidden region. When you submit, the image will reveal its true colors!</div>
        <div class="preview">
          <div id="swatch" class="swatch"></div>
          <div class="sliders">
            <label>Hue: <span id="hueVal">180</span><br><input type="range" id="hue" min="0" max="360" value="180"></label>
            <label>Saturation: <span id="satVal">50%</span><br><input type="range" id="sat" min="0" max="100" value="50"></label>
            <label>Contrast: <span id="conVal">0</span><br><input type="range" id="con" min="-100" max="100" value="0"></label>
          </div>
        </div>
        <div class="actions">
          <button id="submit" class="btn">Submit</button>
          <button id="next" class="btn next-btn" style="display:none;">Next ➡️</button>
          <button id="restart" class="btn restart-btn" style="display:none;">🔄 Restart Game</button>
          <div id="score">Score: —</div>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
